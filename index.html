<!DOCTYPE html>
<html>

<head>

    <title>PunchXR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

    <script src="js/game-manager.js"></script>
    <script src="js/target-spawner.js"></script>
    <script src="js/punch-detection.js"></script>

</head>

<body>

    <a-scene physics="gravity: -9.8" renderer="colorManagementEnabled: true">

        <!-- ENVIRONMENT -->

        <a-sky color="#111"></a-sky>

        <a-plane rotation="-90 0 0" width="30" height="30" color="#222" static-body>
        </a-plane>


        <!-- SCORE UI -->

        <a-text id="scoreText" value="Score: 0" position="0 2 -1" align="center" color="white" width="4">
        </a-text>


        <!-- TIMER UI -->

        <a-text id="timerText" value="Time: 30" position="0 1.7 -1" align="center" color="white" width="4">
        </a-text>


        <!-- INSTRUCTIONS UI -->

        <a-text id="instructionsText" value="Desktop: Click mouse | VR: Use controller trigger/grip" position="0 1.4 -1" align="center" color="#888" width="6" scale="0.8 0.8 0.8">
        </a-text>


        <!-- PLAYER -->

        <a-entity id="rig" position="0 1.6 0">

            <!-- CAMERA -->
            <a-camera id="camera" look-controls></a-camera>

            <!-- LEFT HAND -->

            <a-entity id="leftHand" hand-controls="hand: left">

                <a-sphere radius="0.08" color="red" class="puncher" punch-detection="hand: left" position="0 0 0" scale="1 1 1">
                </a-sphere>

            </a-entity>


            <!-- RIGHT HAND -->

            <a-entity id="rightHand" hand-controls="hand: right">

                <a-sphere radius="0.08" color="blue" class="puncher" punch-detection="hand: right" position="0 0 0" scale="1 1 1">
                </a-sphere>

            </a-entity>

        </a-entity>


        <!-- TARGET SPAWNER -->

        <a-entity target-spawner></a-entity>

    </a-scene>

</body>

</html>
